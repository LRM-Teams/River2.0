<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心形网页</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #120915;
      --bg-2: #240d1f;
      --bg-3: #4c1027;
      --heart-1: #ff86b1;
      --heart-2: #ff496f;
      --heart-3: #b8003c;
      --text: rgba(255, 245, 248, 0.94);
      --muted: rgba(255, 220, 231, 0.74);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 89, 138, 0.18), transparent 26%),
        radial-gradient(circle at 80% 25%, rgba(255, 117, 168, 0.14), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(255, 66, 112, 0.16), transparent 30%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      isolation: isolate;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 28%, transparent 86%);
      opacity: 0.4;
      pointer-events: none;
      z-index: -3;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: radial-gradient(circle, rgba(255, 91, 130, 0.18), transparent 60%);
      filter: blur(50px);
      z-index: -2;
    }

    .card {
      width: min(92vw, 940px);
      min-height: min(88vh, 860px);
      display: grid;
      gap: 28px;
      align-items: center;
      justify-items: center;
      padding: clamp(24px, 4vw, 48px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
    }

    .headline {
      text-align: center;
      display: grid;
      gap: 14px;
      max-width: 680px;
      animation: floatIn 900ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .eyebrow {
      margin: 0;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      font-size: 0.76rem;
      color: rgba(255, 206, 221, 0.84);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      text-shadow: 0 0 24px rgba(255, 101, 143, 0.45);
    }

    .subtitle {
      margin: 0;
      font-size: clamp(1rem, 2.1vw, 1.2rem);
      line-height: 1.8;
      color: var(--muted);
    }

    .stage {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .heart-wrap {
      position: relative;
      width: min(60vw, 320px);
      aspect-ratio: 1;
      transform-style: preserve-3d;
      animation: drift 5.8s ease-in-out infinite;
    }

    .heart {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 100%;
      height: 100%;
      transform: rotate(-45deg) scale(0.95);
      border-radius: 32px;
      background: linear-gradient(135deg, var(--heart-1), var(--heart-2) 48%, var(--heart-3));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.14) inset,
        0 0 36px rgba(255, 73, 111, 0.56),
        0 0 80px rgba(255, 73, 111, 0.3);
      animation: pulse 1.45s ease-in-out infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: inherit;
    }

    .heart::before {
      top: -50%;
      left: 0;
    }

    .heart::after {
      left: 50%;
      top: 0;
    }

    .heart-glow {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.28), transparent 64%);
      filter: blur(18px);
      opacity: 0.8;
      animation: glow 2.6s ease-in-out infinite;
    }

    .heart-ring {
      position: absolute;
      inset: -8%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 28px rgba(255, 86, 126, 0.22);
      animation: spin 14s linear infinite;
    }

    .heart-ring::before,
    .heart-ring::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px dashed rgba(255, 219, 230, 0.28);
      animation: spinReverse 18s linear infinite;
    }

    .heart-ring::after {
      inset: 22%;
      opacity: 0.6;
      animation-duration: 24s;
    }

    .caption {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      width: min(100%, 560px);
      padding: 16px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      background: var(--glass);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      animation: floatIn 1200ms 200ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }

    .caption strong {
      display: block;
      font-size: clamp(1.02rem, 2.4vw, 1.35rem);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .caption span {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .floating-heart {
      position: absolute;
      color: rgba(255, 171, 199, 0.7);
      text-shadow: 0 0 12px rgba(255, 96, 140, 0.5);
      animation: rise linear infinite;
      user-select: none;
      pointer-events: none;
    }

    .floating-heart:nth-child(1) { left: 6%; top: 18%; font-size: 1rem; animation-duration: 11s; animation-delay: -2s; }
    .floating-heart:nth-child(2) { left: 14%; top: 72%; font-size: 1.4rem; animation-duration: 13s; animation-delay: -7s; }
    .floating-heart:nth-child(3) { left: 24%; top: 34%; font-size: 0.8rem; animation-duration: 10s; animation-delay: -4s; }
    .floating-heart:nth-child(4) { right: 10%; top: 22%; font-size: 1.2rem; animation-duration: 12s; animation-delay: -6s; }
    .floating-heart:nth-child(5) { right: 16%; top: 68%; font-size: 0.9rem; animation-duration: 9s; animation-delay: -3s; }
    .floating-heart:nth-child(6) { right: 28%; top: 40%; font-size: 1.5rem; animation-duration: 14s; animation-delay: -9s; }

    @keyframes pulse {
      0%, 100% {
        transform: rotate(-45deg) scale(0.94);
      }
      50% {
        transform: rotate(-45deg) scale(1.03);
      }
    }

    @keyframes glow {
      0%, 100% {
        opacity: 0.72;
        transform: scale(0.98);
      }
      50% {
        opacity: 1;
        transform: scale(1.06);
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(-16px) rotate(1.5deg);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spinReverse {
      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes rise {
      0% {
        transform: translate3d(0, 28px, 0) scale(0.9);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translate3d(0, -160px, 0) scale(1.18);
        opacity: 0;
      }
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .card {
        min-height: auto;
        padding: 18px;
        border-radius: 24px;
      }

      .headline {
        gap: 10px;
      }

      .stage {
        width: min(100%, 420px);
      }

      .caption {
        position: static;
        transform: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="scene">
    <section class="card" aria-label="心形网页">
      <div class="headline">
        <p class="eyebrow">LOVE · HEART · PAGE</p>
        <h1>心形网页</h1>
        <p class="subtitle">一张用光影、呼吸和一点点浪漫拼成的页面。中央的心会轻轻跳动，像在对你说：今天也要开心。</p>
      </div>

      <div class="stage">
        <span class="floating-heart">♥</span>
        <span class="floating-heart">♥</span>
        <span class="floating-heart">♥</span>
        <span class="floating-heart">♥</span>
        <span class="floating-heart">♥</span>
        <span class="floating-heart">♥</span>

        <div class="heart-ring" aria-hidden="true"></div>
        <div class="heart-glow" aria-hidden="true"></div>
        <div class="heart" aria-hidden="true"></div>
      </div>

      <div class="caption">
        <strong>献给所有温柔的心跳</strong>
        <span>如果你想把它做成在线页面，可以直接把这个 `index.html` 放到静态托管里打开。</span>
      </div>
    </section>
  </main>
</body>
</html>
